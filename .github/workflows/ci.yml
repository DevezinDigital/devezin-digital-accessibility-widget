name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # The package installs from GitHub, so dist/ is committed. If a build from
      # the current source differs from the committed dist/, the artifact is
      # stale and would ship outdated code — fail the build loudly.
      - name: Fail if committed dist/ is out of date
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::dist/ is out of date — run 'npm run build' and commit the result."
            git diff --stat -- dist
            exit 1
          fi
